version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: actions/checkout
        update-types:
          - version-update:semver-major
      - dependency-name: jdx/mise-action
        update-types:
          - version-update:semver-major
