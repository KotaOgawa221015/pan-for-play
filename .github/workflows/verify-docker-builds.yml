name: Run Docker Build Check

on:
  push:
    branches: ["main"]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'compose.yaml'
      - 'package.json'
      - 'package-lock.json'
      - 'prisma/**'
      - 'src/**'
      - '.github/workflows/verify-docker-builds.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'compose.yaml'
      - 'package.json'
      - 'package-lock.json'
      - 'prisma/**'
      - 'src/**'
      - '.github/workflows/verify-docker-builds.yml'
  workflow_dispatch:

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [dev, prod]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Docker Build Check (${{ matrix.target }})
        run: docker build --target "${{ matrix.target }}" -t "pancolle-ci:${{ matrix.target }}" .

      - name: Docker Run Check (${{ matrix.target }})
        run: |
          docker run -d --name "pancolle-ci-${{ matrix.target }}" -p 127.0.0.1:3000:3000 -e DATABASE_URL=file:./data/prod.db "pancolle-ci:${{ matrix.target }}"
          curl --retry 30 --retry-delay 2 --retry-connrefused --fail http://127.0.0.1:3000/
