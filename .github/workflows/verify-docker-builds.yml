name: Run Docker Build Check

on:
  push:
    branches: ["main"]
    paths:
      - 'docker/Dockerfile'
      - '.dockerignore'
      - 'docker/compose.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'prisma/**'
      - 'src/**'
      - '.github/workflows/verify-docker-builds.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'docker/Dockerfile'
      - '.dockerignore'
      - 'docker/compose.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'prisma/**'
      - 'src/**'
      - '.github/workflows/verify-docker-builds.yml'
  workflow_dispatch:

concurrency:
  group: verify-docker-builds-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: dev
            database_url: file:./data/dev.db
          - target: prod
            database_url: file:./data/prod.db
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Docker Build Check (${{ matrix.target }})
        run: docker build --file docker/Dockerfile --target "$TARGET" -t "pan-for-play-ci:$TARGET" .

      - name: Docker Run Check (${{ matrix.target }})
        env:
          DATABASE_URL: ${{ matrix.database_url }}
          AUTH_SECRET: ci-auth-secret
          AUTH_GOOGLE_ID: ci-google-id
          AUTH_GOOGLE_SECRET: ci-google-secret
        run: |
          docker run -d --name "pan-for-play-ci-$TARGET" -p 127.0.0.1:3000:3000 -e DATABASE_URL -e AUTH_SECRET -e AUTH_GOOGLE_ID -e AUTH_GOOGLE_SECRET "pan-for-play-ci:$TARGET"
          curl --retry 30 --retry-delay 2 --retry-connrefused --retry-all-errors --fail http://127.0.0.1:3000/login

      - name: Docker Failure Logs (${{ matrix.target }})
        if: failure()
        run: |
          sleep 2
          docker ps -a
          docker inspect --format='status={{.State.Status}} exit={{.State.ExitCode}} error={{.State.Error}}' "pan-for-play-ci-$TARGET" || true
          docker logs "pan-for-play-ci-$TARGET" || true
