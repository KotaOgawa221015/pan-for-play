# Test Workflow
#
# Runs Vitest tests in parallel.

name: Run Tests

on:
  workflow_call:

jobs:
  run-tests:
    name: Run ${{ matrix.test-type }} Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-type: [unit, integration]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Run ${{ matrix.test-type }} Tests
        run: mise exec -- just ${{ matrix.test-type }}-test
      # 依存関係のインストールの後、テスト実行の前にこれを追加/確認
      - name: Generate Prisma Client
        run: npx prisma generate

      # テスト用のDBをセットアップしている場合はこちらも必要かもしれません
      - name: Setup Test Database
        run: npx prisma db push # または npx prisma migrate deploy
