name: Verify Docs Rendering

on:
  pull_request:
    branches: ["main"]
    paths:
      - 'docs/**'
      - '.github/workflows/verify-docs-rendering.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

concurrency:
  group: verify-docs-rendering-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-docs-rendering:
    name: Verify Docs Rendering
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: Preview
            script: test:rendered:preview
          - name: Dev Server
            script: test:rendered:dev
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Development Environment
        uses: ./.github/actions/setup
        with:
          args: '--frozen-lockfile --filter docs --ignore-scripts'

      - name: Install Playwright Browser
        working-directory: docs
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify Rendered Docs (${{ matrix.suite.name }})
        working-directory: docs
        env:
          DOCS_SCRIPT: ${{ matrix.suite.script }}
        run: pnpm "$DOCS_SCRIPT"
