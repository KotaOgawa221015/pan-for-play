name: Verify GitHub Actions Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: verify-github-actions-security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-github-changes:
    name: Detect GitHub Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # Required for pull_request file list resolution.
    outputs:
      github_changed: ${{ steps.filter.outputs.github }}
    steps:
      - name: Detect Changed Paths
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            github:
              - '.github/**'

  verify-github-actions-security:
    name: Verify GitHub Actions Security
    needs: detect-github-changes
    if: ${{ needs.detect-github-changes.outputs.github_changed == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true
          install: false

      - name: Install tools from lockfile
        run: mise install --locked

      - name: Lint Workflows
        run: mise exec -- actionlint -color

      - name: Scan Workflow Vulnerabilities
        run: mise exec -- zizmor --offline --pedantic --strict-collection .
