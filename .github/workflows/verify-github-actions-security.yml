name: Verify GitHub Actions Security

on:
  push:
    branches: ["main"]
    paths:
      - '.github/**'
  pull_request:
    branches: ["main"]
    paths:
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: verify-github-actions-security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-github-actions-security:
    name: Verify GitHub Actions Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true
          install: false

      - name: Install tools from lockfile
        run: mise install --locked

      - name: Lint Workflows
        run: mise exec -- actionlint -color

      - name: Scan Workflow Vulnerabilities
        run: mise exec -- zizmor --offline --pedantic --strict-collection .
