name: Setup Environment
description: Install Node.js, setup mise for other tools, and install pnpm dependencies

inputs:
  node-version-file:
    description: Node.js version file path
    required: false
    default: .nvmrc
  install-mise:
    description: Install mise and tools
    required: false
    default: 'true'
  mise-version:
    description: mise version to install
    required: false
    default: '2026.4.27'
  args:
    description: Arguments passed to `just setup`
    required: false
    default: '--frozen-lockfile'
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6  
      with:  
        cache: true

    - name: Setup Node.js  
      uses: actions/setup-node@v5  
      with:  
        node-version-file: ${{ inputs.node-version-file }}

    - name: Setup mise
      if: inputs.install-mise == 'true'
      uses: jdx/mise-action@v4
      with:
        version: ${{ inputs.mise-version }}
        install_args: --locked

    - name: Run just setup
      run: mise exec -- just setup ${{ inputs.args }}
      shell: bash
