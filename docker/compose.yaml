services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: ${P4P_BUILD_TARGET:-prod}
    ports:
      - "${P4P_HOST_IP:-127.0.0.1}:${P4P_PORT:-3000}:3000"
    environment:
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
      DATABASE_URL: ${DATABASE_URL:-file:./data/prod.db}
    env_file:
      - ../.env
    volumes:
      - ..:/app
      - ../data:/app/data
      - /app/node_modules
      - /app/.next
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/login',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
