services:
  web:
    build:
      context: .
      target: ${PANCOLLE_BUILD_TARGET:-prod}
    ports:
      - "${PANCOLLE_BIND_IP:-127.0.0.1}:${PANCOLLE_PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:./data/prod.db}
    volumes:
      - .:/app
      - ./data:/app/data
      - /app/node_modules
      - /app/.next
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/login',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
