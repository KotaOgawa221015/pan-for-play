services:
  db-init:
    build:
      context: .
      target: tooling
    environment:
      DATABASE_URL: ${PANCOLLE_DATABASE_URL:-file:/data/prod.db}
      PANCOLLE_BUILD_TARGET: ${PANCOLLE_BUILD_TARGET:-prod}
      PANCOLLE_MIGRATION_NAME: ${PANCOLLE_MIGRATION_NAME:-init}
    volumes:
      - sqlite-data:/data
    command:
      - sh
      - -c
      - |
          set -eu
          npx prisma generate
          if [ "$$PANCOLLE_BUILD_TARGET" = "dev" ]; then
            npx prisma migrate dev --name "$$PANCOLLE_MIGRATION_NAME" --skip-seed --skip-generate
          else
            npx prisma migrate deploy
          fi
          npx prisma db seed
    restart: "no"

  web:
    build:
      context: .
      target: ${PANCOLLE_BUILD_TARGET:-prod}
    ports:
      - "${PANCOLLE_BIND_IP:-127.0.0.1}:${PANCOLLE_PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${PANCOLLE_DATABASE_URL:-file:/data/prod.db}
    volumes:
      - sqlite-data:/data
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  sqlite-data:
    driver: local
    name: ${PANCOLLE_PROJECT_NAME:-pancolle}-sqlite-data
    external: false