services:
  web:
    build:
      context: .
      target: ${PANCOLLE_BUILD_TARGET:-prod}
    ports:
      - "${PANCOLLE_BIND_IP:-127.0.0.1}:${PANCOLLE_PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:./data/prod.db}
    volumes:
      - .:/app
      - ./data:/app/data
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
